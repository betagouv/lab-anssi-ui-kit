name: La publication du Storybook
permissions: {}

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - ".storybook/**"
      - "outils/**"
      - "scripts/**"
      - "vite.config.ts"
      - "vite.webcomponents.config.ts"
      - "svelte.config.js"
      - "tsconfig.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/**"

jobs:
  build:
    name: "Construis"
    runs-on: ubuntu-latest

    steps:
      - name: Cloner le dépôt Git
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Utiliser la version Node.js 24
        uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610 # v3.9.1
        with:
          node-version: 24

      - name: Installer les dépendances
        run: npm install -g "$(jq -r '.packageManager' package.json)" && pnpm install

      - name: Installer Playwright
        run: ./node_modules/.bin/playwright install chromium --with-deps

      - name: Exécuter les tests
        run: pnpm run test

      - name: Construit le Storybook
        run: pnpm run storybook:build

      - name: Génère le manifest UI Kit (Utile pour exposer aux agents les contrats des composants)
        run: node scripts/generate-ui-manifest.mjs storybook-static/ui-kit-components.json

      - name: Téléverser les fichiers
        id: deployment
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: ./storybook-static

  deploy:
    name: "Déploie"
    needs: build

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
