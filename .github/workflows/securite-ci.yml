# Vérification des recommandations CIs et autres sur les configurations GitHub
# https://www.checkov.io/1.Welcome/What%20is%20Checkov.html
# https://github.com/bridgecrewio/checkov-action
# https://docs.zizmor.sh/
---
name: Sécurité de la CI
permissions: {}
on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

  workflow_dispatch:

jobs:
  checkov:
    permissions:
      contents: read # for actions/checkout to fetch code
      security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
      actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Checkov GitHub Action
        uses: bridgecrewio/checkov-action@d9d1e5cdc53e3a91f0c4c58db7bc19ee31cac7e5 # v12.3113.0
        with:
          output_format: cli,sarif
          output_file_path: console,results.sarif

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@411c4c9a36b3fca4d674f06b6396b2c6d23522c6 # v3.36.3

        if: success() || failure()
        with:
          sarif_file: results.sarif

  zizmor:
    name: zizmor 🌈
    runs-on: ubuntu-latest
    permissions:
      contents: read # for actions/checkout to fetch code
      security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: zizmor GitHub Action
        uses: zizmorcore/zizmor-action@e639db99335bc9038abc0e066dfcd72e23d26fb4 # v0.3.0
        with:
          advanced-security: true
