name: L'intégration continue
permissions: {}

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - ".storybook/**"
      - "outils/**"
      - "scripts/**"
      - "vite.config.ts"
      - "vite.webcomponents.config.ts"
      - "svelte.config.js"
      - "tsconfig.json"
      - "eslint.config.js"
      - ".prettierrc"
      - ".prettierignore"
      - "pnpm-lock.yaml"
      - ".github/workflows/**"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - ".storybook/**"
      - "outils/**"
      - "scripts/**"
      - "vite.config.ts"
      - "vite.webcomponents.config.ts"
      - "svelte.config.js"
      - "tsconfig.json"
      - "eslint.config.js"
      - ".prettierrc"
      - ".prettierignore"
      - "pnpm-lock.yaml"
      - ".github/workflows/**"

jobs:
  build:
    name: Construction de Lab. ANSSI - UI Kit

    runs-on: ubuntu-latest

    steps:
      - name: Cloner le dépôt Git
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Utiliser la version Node.js 24
        uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610 # v3.9.1
        with:
          node-version: 24

      - name: Installer les dépendances
        run: npm install -g "$(jq -r '.packageManager' package.json)" && pnpm install

      - name: Installer Playwright
        run: ./node_modules/.bin/playwright install chromium --with-deps

      - name: Exécuter les tests
        run: pnpm run test

      - name: Contrôler le format
        run: ./node_modules/.bin/prettier -c .

      - name: Construit le Storybook
        run: pnpm run storybook:build

      - name: Builder le package
        run: pnpm run build
