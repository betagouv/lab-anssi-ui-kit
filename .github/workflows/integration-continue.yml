name: L'intégration continue
permissions: {}

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - ".storybook/**"
      - "outils/**"
      - "scripts/**"
      - "vite.config.ts"
      - "vite.webcomponents.config.ts"
      - "svelte.config.js"
      - "tsconfig.json"
      - "eslint.config.js"
      - ".prettierrc"
      - ".prettierignore"
      - "pnpm-lock.yaml"
      - ".github/workflows/**"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - ".storybook/**"
      - "outils/**"
      - "scripts/**"
      - "vite.config.ts"
      - "vite.webcomponents.config.ts"
      - "svelte.config.js"
      - "tsconfig.json"
      - "eslint.config.js"
      - ".prettierrc"
      - ".prettierignore"
      - "pnpm-lock.yaml"
      - ".github/workflows/**"

jobs:
  build:
    name: Construction de Lab. ANSSI - UI Kit

    runs-on: ubuntu-latest

    steps:
      - name: Cloner le dépôt Git
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Utiliser la version Node.js 24
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24

      - name: Installer les dépendances
        run: npm install -g "$(jq -r '.packageManager' package.json)" && pnpm install

      - name: Installer Playwright
        run: ./node_modules/.bin/playwright install chromium --with-deps

      - name: Exécuter les tests
        run: pnpm run test

      - name: Contrôler le format
        run: ./node_modules/.bin/prettier -c .

      - name: Construit le Storybook
        run: pnpm run storybook:build

      - name: Builder le package
        run: pnpm run build
